# Dependabot — Story 22-4 AC4 (SDLC-04)
# 5 個 ecosystem 每週掃描並自動產生更新 PR：npm / github-actions / docker / pip x2
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'Asia/Hong_Kong'
    open-pull-requests-limit: 10
    labels: ['dependencies', 'npm']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      patch-updates:
        update-types: ['patch']
      dev-dependencies:
        dependency-type: 'development'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'github-actions']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'pip'
    directory: '/python-services/extraction'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'python']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'pip'
    directory: '/python-services/mapping'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'python']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
