# Dependency Audit — npm audit + pip-audit
# Story 22-4 AC5 (SDLC-04)：偵測 npm / pip 相依套件的 HIGH/CRITICAL 漏洞
# 漸進式 rollout：本階段為 advisory（continue-on-error: true）；
#   Week 3 升 required 時移除 continue-on-error 以強制 block merge。
name: Dependency Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # 每週一 08:00 UTC 定期掃描

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm audit --audit-level=high --omit=dev
        continue-on-error: true # advisory 階段；Week 3 移除以強制 block

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit -r python-services/extraction/requirements.txt
        continue-on-error: true # advisory 階段；Week 3 移除以強制 block
      - run: pip-audit -r python-services/mapping/requirements.txt
        continue-on-error: true # advisory 階段；Week 3 移除以強制 block
