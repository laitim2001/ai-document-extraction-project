# SAST — Semgrep CE（PR 觸發靜態掃描）
# Story 22-4 AC6 (SDLC-02)：以 OWASP / TypeScript / React 規則集做靜態安全分析
# 漸進式 rollout：本階段為 advisory（continue-on-error: true）；
#   Week 3 升 required 時，semgrep scan 加 --error 並移除 continue-on-error 以強制 block。
# 註：SARIF 上傳 Security tab 需 GitHub Advanced Security；無 GHAS 時 upload step 自動略過。
name: SAST

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write # upload-sarif 需要

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: >
          semgrep scan
          --config=auto
          --config=p/typescript
          --config=p/owasp-top-ten
          --config=p/javascript
          --config=p/react
          --sarif --output=semgrep.sarif
        continue-on-error: true # advisory 階段；Week 3 加 --error 並移除此行
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true # 無 GitHub Advanced Security 時略過 SARIF 上傳
        with:
          sarif_file: semgrep.sarif
