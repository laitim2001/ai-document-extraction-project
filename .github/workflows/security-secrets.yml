# Secret Scanning — gitleaks（PR + main push）
# Story 22-4 AC3 (SDLC-01)：偵測 API key / password / JWT / PEM 等 secret pattern
# 漸進式 rollout：本階段為 advisory（continue-on-error: true）；
#   Week 3 升 required 時移除 continue-on-error 以強制 block merge。
# 本機 pre-commit（husky）依 2026-06-12 決策不採用，secret 守門點落在 PR 端。
name: Secret Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 完整 history 才能掃描 PR diff
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # advisory 階段；Week 3 移除以強制 block
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE 僅 gitleaks Pro 版需要；OSS 版免費，無需設定
